graph: tinysnb
loading_config:
  data_source:
    scheme: file  # file, oss, s3, hdfs; only file is supported now
  import_option: init # append, overwrite, only init is supported now
  format:
    type: csv
    metadata:
      delimiter: ","  # other loading configuration places here
      header_row: true # whether to use the first row as the header
      quoting: true
      quote_char: '"'
      double_quote: false
      escape_char: '\'
      escaping: true
      block_size: 4MB
      batch_reader: false
      null_values: [""]

vertex_mappings:
  - type_name: person  # must align with the schema
    inputs:
      - vPerson.csv
  - type_name: organisation
    inputs:
      - vOrganisation.csv
  - type_name: movies
    inputs:
      - vMovies.csv
edge_mappings:
  - type_triplet:
      edge: knows
      source_vertex:  person
      destination_vertex:  person
    inputs:
      - eKnows.csv
    source_vertex_mappings:
      - column:
          index: 0
          name: id
    destination_vertex_mappings:
      - column:
          index: 1
          name: id
  - type_triplet:
      edge: studyAt
      source_vertex:  person
      destination_vertex:  organisation
    inputs:
      - eStudyAt.csv
    source_vertex_mappings:
      - column:
          index: 0
          name: id
    destination_vertex_mappings:
      - column:
          index: 1
          name: id
    column_mappings:
      - column:
          index: 2
          name: year
        property: year
      - column:
          index: 3
          name: places
        property: places
      - column:
          index: 4
          name: length
        property: length
      - column:
          index: 5
          name: level
        property: level
      - column:
          index: 6
          name: code
        property: code
      - column:
          index: 7
          name: temperature
        property: temperature
      - column:
          index: 8
          name: ulength
        property: ulength
      - column:
          index: 9
          name: ulevel
        property: ulevel
      - column:
          index: 10
          name: hugedata
        property: hugedata
  - type_triplet:
      edge: workAt
      source_vertex:  person
      destination_vertex:  organisation
    inputs:
      - eWorkAt.csv
    source_vertex_mappings:
      - column:
          index: 0
          name: id
    destination_vertex_mappings:
      - column:
          index: 1
          name: id
  - type_triplet:
      edge: meets
      source_vertex:  person
      destination_vertex:  person
    inputs:
      - eMeets.csv
    source_vertex_mappings:
      - column:
          index: 0
          name: id
    destination_vertex_mappings:
      - column:
          index: 1
          name: id
  - type_triplet:
      edge: marries
      source_vertex:  person
      destination_vertex:  person
    inputs:
      - eMarries.csv
    source_vertex_mappings:
      - column:
          index: 0
          name: id
    destination_vertex_mappings:
      - column:
          index: 1
          name: id
