schema:
  vertex_types:
    - type_name: person
      type_id: 0
      properties:
        - property_id: 0
          property_name: id
          property_type:
            primitive_type: DT_SIGNED_INT64
        - property_id: 1
          property_name: name
          property_type:
              string:
                var_char:
                  max_length: 4
        - property_id: 2
          property_name: age
          property_type:
            primitive_type: DT_SIGNED_INT64
      primary_keys:
        - id
    - type_name: person_v2
      type_id: 1
      properties:
        - property_id: 0
          property_name: id
          property_type:
            primitive_type: DT_SIGNED_INT64
        - property_id: 1
          property_name: name
          property_type:
              string:
                var_char:
                  max_length: 4
        - property_id: 2
          property_name: age
          property_type:
            primitive_type: DT_SIGNED_INT64
      primary_keys:
        - id
  edge_types:
    - type_name: knows
      type_id: 0
      vertex_type_pair_relations:
        - source_vertex: person
          destination_vertex: person
          relation: MANY_TO_MANY
      properties:
        - property_id: 0
          property_name: weight
          property_type:
            primitive_type: DT_DOUBLE
    - type_name: knows_v2
      type_id: 1
      vertex_type_pair_relations:
        - source_vertex: person
          destination_vertex: person
          relation: MANY_TO_MANY
        - source_vertex: person
          destination_vertex: person_v2
          relation: MANY_TO_MANY
      properties:
        - property_id: 0
          property_name: weight
          property_type:
            primitive_type: DT_DOUBLE
