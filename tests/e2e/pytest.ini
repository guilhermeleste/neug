[pytest]
markers =
    cypher_test: mark tests that use Cypher client in TP mode.
    cypher_benchmark: mark benchmark tests that use Cypher client in TP mode.
    neug_ap_test: mark tests that use Neug embedded graph in AP mode.
    neug_tp_test: mark tests that use Neug embedded graph in TP mode.
    neug_benchmark: mark benchmark tests that use Neug embedded graph in AP mode.
    kuzu_test: mark tests that use Kuzu embedded graph.
    kuzu_benchmark: mark benchmark tests that use Kuzu embedded graph.