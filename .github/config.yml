newIssueWelcomeComment: >
  Thanks for opening your first issue here! Be sure to follow the issue template! And a maintainer will get back to you shortly!

  Please feel free to contact us on [DingTalk](https://qr.dingtalk.com/action/joingroup?code=v1,k1,FuRFUjfpVjgGjwM71FP40Wqylw0VfdvQHggo8dhlZdI=&_dt_no_comment=1&origin=11?), WeChat account(graphscope) or [Slack](http://slack.graphscope.io/). We are happy to answer your questions responsively.

newPRWelcomeComment: >
  Thanks for submitting your first pull request! You are awesome! 🤗

  Please make sure you have signed the [CLA](https://cla-assistant.io/alibaba/neug), as this is a mandatory check before a PR being merged.

  Welcome to the NeuG community! 🎉
